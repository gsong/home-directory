# General
set -g default-terminal "screen-256color"
set -g history-limit 50000

# Key binding options
set -g mode-keys vi
set -g xterm-keys on
unbind r
bind r source-file ~/.tmux.conf \; display "Reloaded!"
unbind C-k
bind -n C-k send-keys -R \; clear-history \; send-keys "Enter"

# See http://robots.thoughtbot.com/tmux-copy-paste-on-os-x-a-better-future
set -g default-shell $SHELL
set -g default-command "reattach-to-user-namespace -l ${SHELL}"

# Setup 'v' to begin selection as in Vim
bind -Tcopy-mode-vi 'v' send -X begin-selection
bind -Tcopy-mode-vi 'y' send -X copy-pipe "reattach-to-user-namespace pbcopy"

# Update default binding of `Enter` to also use copy-pipe
unbind -Tcopy-mode-vi enter
bind -Tcopy-mode-vi enter send -X copy-pipe "reattach-to-user-namespace pbcopy"

# Mouse options
set -g mouse on

# Start numbering windows and panes at 1
set -g base-index 1
set -g pane-base-index 1
set -g renumber-windows on

# Highlight status bar on activity
set -g monitor-activity on
set -g visual-activity on

# Titles (window number, program name, active (or not)
set -g set-titles on
set -g set-titles-string '#S.#W.#P'

# Automatically set window title
set -g automatic-rename

# Mute inactive panes: faded text + more noticeable bg shift
set -g window-style 'fg=#565f89,bg=#101014'
set -g window-active-style 'fg=#a9b1d6,bg=#1a1b26'

# Active pane border highlight
set -g pane-border-style 'fg=#292e42'
set -g pane-active-border-style 'fg=#7aa2f7'

# tmux-powerkit
set -g @powerkit_theme "tokyo-night"
set -g @powerkit_theme_variant "night"
set -g @powerkit_separator_style "rounded"
set -g @powerkit_plugins ""
run-shell ~/.tmux/plugins/tmux-powerkit/tmux-powerkit.tmux
set -g status-position bottom
