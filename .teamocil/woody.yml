name: "general"
windows:
  - name: woody
    root: ~/src/costmine/woody
    layout: even-vertical
    focus: true
    panes:
      - ""
      - commands:
          - git fetch
          - pnpm i
          - pnpm run dev
      - commands:
          - claude --allow-dangerously-skip-permissions
        focus: true

  - name: woody-dp
    root: ~/src/costmine/woody-data-platform
    layout: even-vertical
    panes:
      - focus: true
      - commands:
          - git fetch
          - docker compose up -d --wait --build --pull always
          - docker compose logs -f
